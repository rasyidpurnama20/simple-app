name: quality-gate

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: quality-gate-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env: {POSTGRES_DB: obe_test, POSTGRES_USER: obe, POSTGRES_PASSWORD: test-only}
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U obe" --health-interval 5s
          --health-timeout 5s --health-retries 10
    env:
      DJANGO_SETTINGS_MODULE: config.settings.test
      OBE_ENV: test
      DATABASE_URL: postgresql://obe:test-only@127.0.0.1:5432/obe_test
      OBE_SECRET_KEY: ci-only-not-a-production-secret
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with: {python-version: "3.12", cache: pip}
      - uses: actions/setup-node@v7
        with: {node-version: "24", cache: npm}
      - run: pip install -e '.[dev]'
      - run: npm ci && npm run build
      - run: ruff check .
      - run: ruff format --check .
      - run: mypy config obe --exclude migrations
      - name: Validate deterministic and reversible migrations
        run: |
          python manage.py makemigrations --check --dry-run
          python manage.py showmigrations --plan > migration-plan.txt
          python scripts/check_migration_reversibility.py
      - run: python tests/test_architecture.py
      - name: Run tests and critical-module coverage gate
        run: |
          coverage run -m pytest --junitxml=test-report.xml
          coverage report
          coverage xml
          coverage json -o coverage.json
          python scripts/check_critical_coverage.py coverage.json
      - name: Re-run tests with an independent hash seed
        env:
          PYTHONHASHSEED: "7331"
        run: pytest --cache-clear
      - run: pip-audit
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: quality-evidence
          if-no-files-found: warn
          path: |
            test-report.xml
            coverage.xml
            coverage.json
            migration-plan.txt

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with: {fetch-depth: 0}
      - uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  sbom:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with: {python-version: "3.12"}
      - run: pip install -e . cyclonedx-bom
      - run: cyclonedx-py environment --output-file sbom-python.json
      - uses: actions/upload-artifact@v7
        with: {name: sbom, path: sbom-python.json}

  image-evidence:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Build release-candidate image and capture immutable ID
        run: docker build --tag obe-apps:ci --iidfile image-digest.txt .
      - uses: actions/upload-artifact@v7
        with: {name: image-digest, path: image-digest.txt}
