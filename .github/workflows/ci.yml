name: quality-gate

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env: {POSTGRES_DB: obe_test, POSTGRES_USER: obe, POSTGRES_PASSWORD: test-only}
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U obe" --health-interval 5s
          --health-timeout 5s --health-retries 10
    env:
      DJANGO_SETTINGS_MODULE: config.settings.test
      DATABASE_URL: postgresql://obe:test-only@127.0.0.1:5432/obe_test
      OBE_SECRET_KEY: ci-only-not-a-production-secret
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.12", cache: pip}
      - uses: actions/setup-node@v7
        with: {node-version: "24", cache: npm}
      - run: pip install -e '.[dev]'
      - run: npm ci && npm run build
      - run: ruff check .
      - run: ruff format --check .
      - run: mypy config obe --exclude migrations
      - run: python manage.py makemigrations --check --dry-run
      - run: python tests/test_architecture.py
      - run: coverage run -m pytest && coverage report && coverage xml
      - run: pip-audit
      - uses: actions/upload-artifact@v4
        if: always()
        with: {name: quality-evidence, path: coverage.xml, if-no-files-found: warn}

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: {fetch-depth: 0}
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  sbom:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.12"}
      - run: pip install -e . cyclonedx-bom
      - run: cyclonedx-py environment --output-file sbom-python.json
      - uses: actions/upload-artifact@v4
        with: {name: sbom, path: sbom-python.json}
