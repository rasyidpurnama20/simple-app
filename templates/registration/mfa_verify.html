{% extends "base.html" %}
{% block title %}Verifikasi MFA · OBE Apps{% endblock %}
{% block content %}
<div class="mx-auto max-w-md rounded-2xl border border-slate-200 bg-white p-6 shadow-sm">
  <h1 class="text-2xl font-bold">Verifikasi dua langkah</h1>
  <p class="mt-2 text-sm text-slate-600">Masukkan kode sekali pakai yang dikirim ke kanal akun Anda.</p>
  <form method="post" class="mt-6 space-y-4">
    {% csrf_token %}
    <label for="id_token" class="block text-sm font-medium">Kode verifikasi</label>
    <input id="id_token" name="token" autocomplete="one-time-code" required class="w-full rounded-lg border border-slate-300 px-3 py-2">
    <button class="w-full rounded-lg bg-indigo-600 px-4 py-2.5 font-semibold text-white">Verifikasi</button>
  </form>
</div>
{% endblock %}
