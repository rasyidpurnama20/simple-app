user nginx;
worker_processes auto;
events { worker_connections 1024; }
http {
  server_tokens off;
  limit_req_zone $binary_remote_addr zone=login:10m rate=10r/m;
  limit_req_zone $binary_remote_addr zone=api:10m rate=120r/m;
  limit_req_zone $binary_remote_addr zone=file:10m rate=30r/m;
  limit_req_zone $binary_remote_addr zone=export:10m rate=5r/m;
  limit_req_zone $binary_remote_addr zone=ai:10m rate=20r/m;
  upstream obe_web { server web:8000; keepalive 16; }
  server {
    listen 80;
    client_max_body_size 25m;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";
    add_header X-Content-Type-Options nosniff always;
    add_header Content-Security-Policy "default-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header X-Frame-Options DENY always;
    location /accounts/login/ { limit_req zone=login burst=5 nodelay; proxy_pass http://obe_web; }
    location /admin/ { allow 127.0.0.1; deny all; proxy_pass http://obe_web; }
    location /evidence/ { limit_req zone=file burst=10 nodelay; proxy_pass http://obe_web; }
    location /api/v1/export/ { limit_req zone=export burst=2 nodelay; proxy_pass http://obe_web; }
    location /api/v1/ai/ { limit_req zone=ai burst=5 nodelay; proxy_pass http://obe_web; }
    location /api/ { limit_req zone=api burst=40 nodelay; proxy_pass http://obe_web; }
    location /static/ { proxy_pass http://obe_web; expires 1y; add_header Cache-Control "public, immutable"; }
    location / { proxy_pass http://obe_web; }
  }
}
