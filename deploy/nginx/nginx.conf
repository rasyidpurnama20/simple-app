user nginx;
worker_processes auto;
events { worker_connections 1024; }
http {
  server_tokens off;
  limit_req_zone $binary_remote_addr zone=login:10m rate=10r/m;
  limit_req_zone $binary_remote_addr zone=api:10m rate=120r/m;
  upstream obe_web { server web:8000; keepalive 16; }
  server {
    listen 80;
    client_max_body_size 25m;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header X-Frame-Options DENY always;
    location /accounts/login/ { limit_req zone=login burst=5 nodelay; proxy_pass http://obe_web; include /etc/nginx/proxy_params; }
    location /api/ { limit_req zone=api burst=40 nodelay; proxy_pass http://obe_web; include /etc/nginx/proxy_params; }
    location /static/ { proxy_pass http://obe_web; include /etc/nginx/proxy_params; expires 1y; add_header Cache-Control "public, immutable"; }
    location / { proxy_pass http://obe_web; include /etc/nginx/proxy_params; }
  }
}

