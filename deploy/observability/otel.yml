extensions:
  health_check: {endpoint: "0.0.0.0:13133"}

receivers:
  otlp:
    protocols:
      grpc: {endpoint: "0.0.0.0:4317"}
      http: {endpoint: "0.0.0.0:4318"}

processors:
  memory_limiter: {check_interval: 1s, limit_mib: 512, spike_limit_mib: 128}
  batch: {send_batch_size: 1024, timeout: 5s}
  attributes/redact:
    actions:
      - {key: user.name, action: delete}
      - {key: user.id, action: delete}
      - {key: student.number, action: delete}
      - {key: grade.raw, action: delete}
      - {key: exam.answer, action: delete}
      - {key: ai.prompt, action: delete}
      - {key: file.path, action: delete}
      - {key: http.request.body, action: delete}
      - {key: http.response.body, action: delete}
      - {key: http.request.header.authorization, action: delete}
      - {key: http.request.header.cookie, action: delete}
      - {key: http.response.header.set-cookie, action: delete}
      - {key: db.connection_string, action: delete}
      - {key: db.statement, action: delete}
      - {key: messaging.message.body, action: delete}
      - {key: celery.task.args, action: delete}
      - {key: celery.task.kwargs, action: delete}
      - {key: exception.stacktrace, action: delete}

exporters:
  prometheus: {endpoint: "0.0.0.0:8889", namespace: obe}
  otlphttp/tempo: {endpoint: "http://tempo:4318"}
  otlphttp/loki: {endpoint: "http://loki:3100/otlp"}

service:
  extensions: [health_check]
  telemetry:
    logs: {level: info}
  pipelines:
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, attributes/redact, batch]
      exporters: [prometheus]
    traces:
      receivers: [otlp]
      processors: [memory_limiter, attributes/redact, batch]
      exporters: [otlphttp/tempo]
    logs:
      receivers: [otlp]
      processors: [memory_limiter, attributes/redact, batch]
      exporters: [otlphttp/loki]
