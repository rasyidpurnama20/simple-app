name: obe-server

x-app: &app
  image: "${OBE_IMAGE:?Set immutable image@sha256 digest}"
  env_file: "${OBE_ENV_FILE:-../env/production.env}"
  secrets: [database_url, obe_secret_key, litellm_api_key, rabbitmq_url]
  volumes:
    - "${OBE_DATA_ROOT:-/srv/obe}/evidence:/app/var/evidence"
    - "${OBE_DATA_ROOT:-/srv/obe}/uploads:/app/var/uploads"
    - "${OBE_DATA_ROOT:-/srv/obe}/config:/run/obe-config:ro"
  networks: [application, data, telemetry]
  read_only: true
  tmpfs: [/tmp]
  restart: unless-stopped
  deploy:
    resources:
      limits: {cpus: "2.0", memory: 2G}
      reservations: {memory: 512M}

x-worker: &worker
  <<: *app
  depends_on:
    database: {condition: service_healthy}
    valkey: {condition: service_healthy}
    rabbitmq: {condition: service_healthy}
    migrate: {condition: service_completed_successfully}
  healthcheck:
    test: ["CMD-SHELL", "celery -A config inspect ping -d celery@$${HOSTNAME} --timeout 5"]
    interval: 30s
    timeout: 10s
    retries: 5
  stop_grace_period: 60s

services:
  database:
    image: "${POSTGRES_IMAGE:?Set postgres image@sha256 digest}"
    environment:
      POSTGRES_DB: obe
      POSTGRES_USER: obe
      POSTGRES_PASSWORD_FILE: /run/secrets/database_password
    secrets: [database_password]
    volumes:
      - "${OBE_DATA_ROOT:-/srv/obe}/database:/var/lib/postgresql/data"
      - "${OBE_DATA_ROOT:-/srv/obe}/backups:/backups:ro"
    networks: [data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U obe -d obe"]
      interval: 5s
      timeout: 5s
      retries: 12
    restart: unless-stopped
    deploy:
      resources:
        limits: {cpus: "2.0", memory: 2G}

  valkey:
    image: "${VALKEY_IMAGE:?Set valkey image@sha256 digest}"
    command: ["valkey-server", "--appendonly", "no", "--maxmemory", "512mb", "--maxmemory-policy", "allkeys-lfu", "--tcp-keepalive", "60"]
    volumes: ["${OBE_DATA_ROOT:-/srv/obe}/cache:/data"]
    networks: [data]
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12
    restart: unless-stopped
    deploy:
      resources:
        limits: {cpus: "1.0", memory: 768M}

  rabbitmq:
    image: "${RABBITMQ_IMAGE:?Set rabbitmq image@sha256 digest}"
    environment:
      RABBITMQ_DEFAULT_USER: obe
      RABBITMQ_DEFAULT_PASS_FILE: /run/secrets/rabbitmq_password
      RABBITMQ_DEFAULT_VHOST: obe
      RABBITMQ_VM_MEMORY_HIGH_WATERMARK_RELATIVE: "0.70"
      RABBITMQ_DISK_FREE_LIMIT: 2GB
    secrets: [rabbitmq_password]
    configs:
      - {source: rabbitmq_plugins, target: /etc/rabbitmq/enabled_plugins}
    volumes: ["${OBE_DATA_ROOT:-/srv/obe}/queue:/var/lib/rabbitmq"]
    networks: [data]
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12
    restart: unless-stopped
    deploy:
      resources:
        limits: {cpus: "1.5", memory: 1G}

  clamav:
    image: "${CLAMAV_IMAGE:?Set clamav image@sha256 digest}"
    networks: [data]
    healthcheck:
      test: ["CMD", "clamdscan", "--ping", "1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s
    restart: unless-stopped
    deploy:
      resources:
        limits: {cpus: "1.5", memory: 2G}

  migrate:
    <<: *app
    command: ["python", "manage.py", "migrate", "--noinput"]
    depends_on:
      database: {condition: service_healthy}
    restart: "no"

  web:
    <<: *app
    environment:
      OBE_MAINTENANCE_MODE: "${OBE_MAINTENANCE_MODE:-0}"
      OBE_MAINTENANCE_FILE: /run/obe-config/maintenance
      CLAMAV_HOST: clamav
    depends_on:
      database: {condition: service_healthy}
      valkey: {condition: service_healthy}
      rabbitmq: {condition: service_healthy}
      clamav: {condition: service_healthy}
      migrate: {condition: service_completed_successfully}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/readyz/', timeout=3)"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 20s

  worker-interactive:
    <<: *worker
    command: ["celery", "-A", "config", "worker", "-l", "INFO", "-Q", "interactive,academic-critical", "--concurrency=4", "--prefetch-multiplier=1"]

  worker-ai:
    <<: *worker
    networks: [application, data, ai, telemetry]
    command: ["celery", "-A", "config", "worker", "-l", "INFO", "-Q", "ai", "--concurrency=2", "--prefetch-multiplier=1", "--max-tasks-per-child=50"]

  worker-reports:
    <<: *worker
    command: ["celery", "-A", "config", "worker", "-l", "INFO", "-Q", "reports", "--concurrency=2", "--prefetch-multiplier=1", "--max-tasks-per-child=25"]

  worker-imports:
    <<: *worker
    command: ["celery", "-A", "config", "worker", "-l", "INFO", "-Q", "imports", "--concurrency=1", "--prefetch-multiplier=1", "--max-tasks-per-child=10"]

  worker-notifications:
    <<: *worker
    command: ["celery", "-A", "config", "worker", "-l", "INFO", "-Q", "notifications", "--concurrency=4", "--prefetch-multiplier=1"]

  worker-sync:
    <<: *worker
    networks: [application, data, exam-edge, telemetry]
    command: ["celery", "-A", "config", "worker", "-l", "INFO", "-Q", "sync", "--concurrency=2", "--prefetch-multiplier=1"]

  worker-batch:
    <<: *worker
    command: ["celery", "-A", "config", "worker", "-l", "INFO", "-Q", "batch,maintenance", "--concurrency=2", "--prefetch-multiplier=1", "--max-tasks-per-child=25"]

  beat:
    <<: *app
    command: ["celery", "-A", "config", "beat", "-l", "INFO", "--pidfile=/tmp/celerybeat.pid"]
    depends_on:
      database: {condition: service_healthy}
      rabbitmq: {condition: service_healthy}
      migrate: {condition: service_completed_successfully}

  proxy:
    image: "${NGINX_IMAGE:?Set nginx image@sha256 digest}"
    ports: ["443:443"]
    configs:
      - {source: nginx_config, target: /etc/nginx/nginx.conf}
    volumes:
      - "${OBE_DATA_ROOT:-/srv/obe}/tls:/etc/nginx/tls:ro"
    networks: [public, application, administration]
    depends_on:
      web: {condition: service_healthy}
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://web:8000/healthz/"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits: {cpus: "1.0", memory: 256M}

secrets:
  database_password: {file: "${OBE_SECRET_DIR:?Set secret directory}/database_password"}
  database_url: {file: "${OBE_SECRET_DIR:?Set secret directory}/database_url"}
  obe_secret_key: {file: "${OBE_SECRET_DIR:?Set secret directory}/obe_secret_key"}
  litellm_api_key: {file: "${OBE_SECRET_DIR:?Set secret directory}/litellm_api_key"}
  rabbitmq_password: {file: "${OBE_SECRET_DIR:?Set secret directory}/rabbitmq_password"}
  rabbitmq_url: {file: "${OBE_SECRET_DIR:?Set secret directory}/rabbitmq_url"}

configs:
  nginx_config: {file: ./nginx.conf}
  rabbitmq_plugins: {file: ./rabbitmq_enabled_plugins}

networks:
  public: {}
  application: {internal: true}
  data: {name: obe-data, internal: true}
  telemetry: {name: obe-telemetry, internal: true}
  ai: {name: obe-ai, internal: true}
  administration: {name: obe-administration, internal: true}
  exam-edge: {name: obe-exam-edge, internal: true}
