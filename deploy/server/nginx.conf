user nginx;
worker_processes auto;
events { worker_connections 1024; }
http {
  server_tokens off;
  limit_req_zone $binary_remote_addr zone=login:10m rate=10r/m;
  limit_req_zone $binary_remote_addr zone=api:10m rate=120r/m;
  upstream obe_web { server web:8000; keepalive 16; }
  proxy_http_version 1.1;
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
  server {
    listen 443 ssl;
    ssl_certificate /etc/nginx/tls/fullchain.pem;
    ssl_certificate_key /etc/nginx/tls/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    client_max_body_size 25m;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header X-Frame-Options DENY always;
    location /accounts/login/ { limit_req zone=login burst=5 nodelay; proxy_pass http://obe_web; }
    location /api/ { limit_req zone=api burst=40 nodelay; proxy_pass http://obe_web; }
    location /static/ { proxy_pass http://obe_web; expires 1y; add_header Cache-Control "public, immutable"; }
    location / { proxy_pass http://obe_web; }
  }
}
