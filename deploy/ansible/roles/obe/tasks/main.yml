- name: Create OBE system group
  ansible.builtin.group: {name: obe, system: true}
- name: Create OBE system user
  ansible.builtin.user: {name: obe, group: obe, system: true, shell: /usr/sbin/nologin}
- name: Create private data directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: obe
    group: obe
    mode: "0750"
  loop: [/srv/obe, /srv/obe/evidence, /srv/obe/backups, /srv/obe/config]
- name: Install Docker engine packages
  ansible.builtin.package:
    name: [docker.io, docker-compose-plugin]
    state: present
- name: Enable Docker
  ansible.builtin.service: {name: docker, state: started, enabled: true}
- name: Install firewall baseline
  ansible.builtin.package: {name: ufw, state: present}
- name: Deny inbound by default
  community.general.ufw: {direction: incoming, policy: deny}
- name: Allow HTTPS
  community.general.ufw: {rule: allow, port: "443", proto: tcp}
- name: Enable firewall
  community.general.ufw: {state: enabled}

