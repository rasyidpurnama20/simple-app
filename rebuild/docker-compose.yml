name: obe-stage0

services:
  db:
    image: postgres:17-alpine
    container_name: obe-stage0-db
    environment:
      POSTGRES_DB: obe_stage0
      POSTGRES_USER: obe_stage0
      POSTGRES_PASSWORD: stage0-local-db-only
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U obe_stage0 -d obe_stage0"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    volumes:
      - stage0_postgres_data:/var/lib/postgresql/data

  web:
    build:
      context: .
    container_name: obe-stage0-web
    depends_on:
      db:
        condition: service_healthy
    environment:
      POSTGRES_DB: obe_stage0
      POSTGRES_USER: obe_stage0
      POSTGRES_PASSWORD: stage0-local-db-only
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      STAGE0_DEMO_PASSWORD: ${STAGE0_DEMO_PASSWORD:-belajar-tahap0}
      STAGE0_PORT: ${STAGE0_PORT:-8000}
    ports:
      - "127.0.0.1:${STAGE0_PORT:-8000}:8000"
    restart: unless-stopped

volumes:
  stage0_postgres_data:
    name: obe-stage0-postgres-data
